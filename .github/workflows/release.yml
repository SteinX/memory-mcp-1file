name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, e.g. v0.9.0"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_REF }}
          draft: false
          prerelease: false
          generate_release_notes: true

  # 🚀 Critical Path: Build MUSL -> Publish Docker
  build-musl:
    needs: create-release
    name: Build Linux MUSL (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            rustflags: "-C target-cpu=x86-64-v3"
          - target: aarch64-unknown-linux-musl
            rustflags: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build MUSL
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cargo install cross
          cross build --release --target "${{ matrix.target }}"
        shell: bash

      - name: Package Artifacts
        shell: bash
        run: |
          VERSION=${RELEASE_REF#v}
          BINARY_NAME="memory-mcp"
          TARGET="${{ matrix.target }}"
          BIN_PATH="target/${TARGET}/release/$BINARY_NAME"
          ASSET_NAME="memory-mcp-$VERSION-${TARGET}.tar.gz"
          
          echo "Packaging $BIN_PATH to $ASSET_NAME"
          tar -czf "$ASSET_NAME" -C $(dirname "$BIN_PATH") "$BINARY_NAME"
          
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_REF }}
          files: ${{ env.ASSET_NAME }}

  docker-release:
    needs: build-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Compute publish targets
        id: publish_targets
        shell: bash
        run: |
          REPO_LOWER=$(printf '%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_LOWER}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.publish_targets.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_REF }}
            type=raw,value=latest

      - name: Prepare Version
        id: prep
        run: |
          VERSION=${RELEASE_REF#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.prep.outputs.VERSION }}
            REPO=${{ github.repository }}

  # 📦 Secondary Path: Build other binaries
  build-others:
    needs: create-release
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            archive_ext: .tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            archive_ext: .zip
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            archive_ext: .tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            archive_ext: .tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          FEATURES=""
          export RUSTFLAGS=""

          # CPU optimizations for x86_64 targets
          if [[ "$TARGET" == x86_64-* ]]; then
            export RUSTFLAGS="-C target-cpu=x86-64-v3"
          fi

          # Hardware-accelerated BLAS features per OS
          case "${{ matrix.os }}" in
            ubuntu-*)  FEATURES="" ;;
            windows-*) FEATURES="" ;;
            macos-*)   FEATURES="" ;;
          esac

          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cargo install cross
            cross build --release --target "$TARGET" $FEATURES
          else
            cargo build --release --target "$TARGET" $FEATURES
          fi

      - name: Package Artifacts
        shell: bash
        run: |
          VERSION=${RELEASE_REF#v}
          BINARY_NAME="memory-mcp"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME="memory-mcp.exe"
          fi
          
          BIN_PATH="target/${{ matrix.target }}/release/$BINARY_NAME"
          ASSET_NAME="memory-mcp-$VERSION-${{ matrix.target }}${{ matrix.archive_ext }}"
          
          echo "Packaging $BIN_PATH to $ASSET_NAME"
          
          if [ "${{ matrix.archive_ext }}" = ".zip" ]; then
            7z a "$ASSET_NAME" "$BIN_PATH"
          else
            tar -czf "$ASSET_NAME" -C $(dirname "$BIN_PATH") "$BINARY_NAME"
          fi
          
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_REF }}
          files: ${{ env.ASSET_NAME }}

  # 📦 Publish npm wrapper package
  npm-publish:
    needs: [build-musl, build-others]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Read npm package metadata
        id: npm_meta
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./npm/package.json').name")
          PACKAGE_BASENAME=$(node -p "require('./npm/package.json').name.replace(/^@[^/]+\//, '')")
          REPO_OWNER_LOWER=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TARGET_PACKAGE_SCOPE="@${REPO_OWNER_LOWER}"
          TARGET_PACKAGE_NAME="@${REPO_OWNER_LOWER}/${PACKAGE_BASENAME}"

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_basename=${PACKAGE_BASENAME}" >> "$GITHUB_OUTPUT"
          echo "target_package_scope=${TARGET_PACKAGE_SCOPE}" >> "$GITHUB_OUTPUT"
          echo "target_package_name=${TARGET_PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: ${{ steps.npm_meta.outputs.target_package_scope }}

      - name: Sync npm package metadata from repository
        run: |
          VERSION=${RELEASE_REF#v}
          REPOSITORY_URL="https://github.com/${{ github.repository }}"
          TARGET_PACKAGE_NAME="${{ steps.npm_meta.outputs.target_package_name }}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.name = '$TARGET_PACKAGE_NAME';
            pkg.version = '$VERSION';
            pkg.repository = {
              type: 'git',
              url: 'git+' + '$REPOSITORY_URL' + '.git'
            };
            pkg.homepage = '$REPOSITORY_URL#readme';
            pkg.bugs = { url: '$REPOSITORY_URL/issues' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing ${TARGET_PACKAGE_NAME}@${VERSION} to GitHub Packages"

      - name: Publish to GitHub Packages
        run: |
          cd npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
