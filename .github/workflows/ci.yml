name: Cache Seed

on:
  push:
    branches:
      - master
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '_patches/**'
      - '.github/workflows/ci.yml'
  schedule:
    # Run weekly on Monday at 06:00 UTC to prevent 7-day cache eviction
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual triggering

# Cancel in-progress runs if new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  seed:
    name: Seed ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: false

      # Build dependencies only (skip compiling the binary and skip LTO linking)
      - name: Compile dependencies
        run: |
          FEATURES=""
          EXTRA_RUSTFLAGS=""
          
          case "${{ matrix.target }}" in
            x86_64-*)
              EXTRA_RUSTFLAGS="-C target-cpu=x86-64-v3"
              ;;
          esac
          
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu|x86_64-pc-windows-msvc)
              FEATURES=""
              ;;
            *-apple-darwin)
              FEATURES="--features accelerate"
              ;;
          esac
          
          export RUSTFLAGS="${RUSTFLAGS} ${EXTRA_RUSTFLAGS}"
          cargo build --release --lib --target ${{ matrix.target }} ${FEATURES}
        shell: bash

  seed-musl:
    name: Seed x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl
          cache-on-failure: false

      - name: Compile dependencies
        run: cross build --release --lib --target x86_64-unknown-linux-musl
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
